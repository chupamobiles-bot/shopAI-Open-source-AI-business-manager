name: mobilekhata
description: AI-powered mobile shop manager — sales, purchases, IMEI inventory.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.1

  # Camera & image picking
  image_picker: ^1.1.2
  camera: ^0.10.5+9

  # Google ML Kit — on-device OCR (FREE, no API)
  google_mlkit_text_recognition: ^0.13.1

  # Local storage
  shared_preferences: ^2.3.2

  # State management
  provider: ^6.1.2

  # Formatting
  intl: ^0.19.0

  # UI extras
  flutter_staggered_animations: ^1.1.1
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
